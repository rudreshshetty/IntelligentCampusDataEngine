<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sapthagiri NPS University - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0,0,0,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .login-container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-body {
            padding: 40px;
        }
        .form-title {
            text-align: center;
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .form-subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .role-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .role-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        .role-btn.student.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-color: #667eea; }
        .role-btn.lecturer.active { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-color: #f5576c; }
        .role-btn.admin.active { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); border-color: #38f9d7; }
        
        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 12px 15px;
            margin-bottom: 15px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .btn-login.lecturer { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-login.lecturer:hover { box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4); }
        .btn-login.admin { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .btn-login.admin:hover { box-shadow: 0 5px 20px rgba(67, 233, 123, 0.4); }
        
        .icon-wrapper {
            text-align: center;
            margin-bottom: 30px;
            padding: 10px 0;
            background: transparent;
            border-radius: 10px;
        }
        .icon-wrapper img {
            max-height: 100px;
            max-width: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
        .icon-wrapper i {
            font-size: 40px;
            color: #667eea;
        }
        .demo-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 12px;
            color: #666;
        }
        .demo-info strong {
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        .demo-box {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-body">
                <div class="icon-wrapper">
                    <img src="{{ url_for('static', filename='logos/sapthagiri_logo.svg') }}" alt="Sapthagiri NPS University">
                </div>
                
                <h1 class="form-title">Sapthagiri NPS University</h1>
                <p class="form-subtitle">Login to your account</p>

                <!-- Role Selection Buttons -->
                <div class="role-selector">
                    <button type="button" class="role-btn student active" onclick="selectRole('student')">
                        <i class="fas fa-user-graduate"></i> Student
                    </button>
                    <button type="button" class="role-btn lecturer" onclick="selectRole('lecturer')">
                        <i class="fas fa-chalkboard-user"></i> Lecturer
                    </button>
                    <button type="button" class="role-btn admin" onclick="selectRole('admin')">
                        <i class="fas fa-shield-alt"></i> Admin
                    </button>
                </div>

                <!-- Error Message Display -->
                <div id="errorMessage" style="{% if error %}display: block;{% else %}display: none;{% endif %} background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #f5576c;">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                </div>

                <form method="POST" action="/login" id="loginForm">
                    <!-- Hidden input to store selected role -->
                    <input type="hidden" id="selectedRole" name="selected_role" value="student">

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="Enter your username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-login student" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="demo-info">
                    <strong>📚 Demo Credentials:</strong>
                    <div class="demo-box" id="demoStudent">
                        <strong style="color: #667eea;">🎓 Student:</strong> student1 / pass
                    </div>
                    <div class="demo-box" id="demoLecturer" style="display: none;">
                        <strong style="color: #f5576c;">👨‍🏫 Lecturer:</strong> lecturer1 / pass
                    </div>
                    <div class="demo-box" id="demoAdmin" style="display: none;">
                        <strong style="color: #43e97b;">🏢 Admin:</strong> admin1 / pass
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check for error message in URL params or from Flask template
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error') || '{{ error or "" }}';
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            if (error) {
                if (error === 'invalid_credentials') {
                    errorText.textContent = 'Invalid credentials. Please check your username and password, and ensure you\'ve selected the correct role.';
                } else if (error === 'role_mismatch') {
                    errorText.textContent = 'Invalid credentials. Your account is not associated with the selected role.';
                } else {
                    errorText.textContent = 'Login failed. Please try again.';
                }
                
                errorDiv.style.display = 'block';
                document.getElementById('username').focus();
            }
        });

        function selectRole(role) {
            // Update button states
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.role-btn').classList.add('active');
            
            // Store selected role in hidden input
            document.getElementById('selectedRole').value = role;
            
            // Update login button style
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.className = 'btn btn-login ' + role;
            
            // Update demo info
            document.getElementById('demoStudent').style.display = role === 'student' ? 'block' : 'none';
            document.getElementById('demoLecturer').style.display = role === 'lecturer' ? 'block' : 'none';
            document.getElementById('demoAdmin').style.display = role === 'admin' ? 'block' : 'none';
            
            // Clear error message when role is changed
            document.getElementById('errorMessage').style.display = 'none';
            
            // Clear username field for better UX
            document.getElementById('username').focus();
        }
    </script>
</body>
</html>
