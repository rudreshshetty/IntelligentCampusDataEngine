<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:linear-gradient(135deg,#e8f5e9 0,#fff 100%);min-height:100vh}
    .card{max-width:900px;margin:24px auto}
    .actions{display:flex;gap:.5rem}
    @media (max-width:576px){.actions{flex-direction:column}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Edit Student</h5>
      </div>
      <div class="card-body">
        <form id="studentForm">
          <input type="hidden" id="studentId" />
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Enrollment No</label>
              <input id="enrollmentNo" class="form-control" disabled />
            </div>
            <div class="col-md-6">
              <label class="form-label">Admission Date</label>
              <input id="admissionDate" type="date" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input id="name" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Username</label>
              <input id="username" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Password (leave blank to keep current)</label>
              <input id="password" type="password" class="form-control" placeholder="Leave blank to keep current password" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input id="email" type="email" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input id="phone" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Parent Contact</label>
              <input id="parentContact" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Status</label>
              <select id="status" class="form-control">
                <option>Active</option>
                <option>Inactive</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Notes (optional)</label>
              <textarea id="notes" class="form-control" rows="3"></textarea>
            </div>
          </div>

          <div class="mt-4 d-flex justify-content-end actions">
            <button type="button" id="deleteBtn" class="btn btn-outline-danger">Delete Student</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/admin" class="btn btn-secondary">Back</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Fetch student id from URL
    const pathParts = location.pathname.split('/');
    const studentId = pathParts[pathParts.length-1] || '';
    document.getElementById('studentId').value = studentId;

    function showAlert(msg){alert(msg)}

    function loadStudent(){
      fetch('/get_student/' + studentId, {credentials:'same-origin'})
        .then(r=>r.json())
        .then(data=>{
          if(data.status==='success'){
            const s = data.student;
            document.getElementById('enrollmentNo').value = s.enrollment_no || '';
            // Format admission date for date input (YYYY-MM-DD)
            if(s.admission_date){
              const d = new Date(s.admission_date);
              const isoStr = d.toISOString().split('T')[0];
              document.getElementById('admissionDate').value = isoStr;
            }
            document.getElementById('name').value = s.name || '';
            document.getElementById('username').value = s.username || '';
            document.getElementById('email').value = s.email || '';
            document.getElementById('phone').value = s.phone || '';
            document.getElementById('parentContact').value = s.parent_contact || '';
            document.getElementById('status').value = s.status || 'Active';
            document.getElementById('notes').value = s.notes || '';
          } else {
            showAlert('Error loading student');
          }
        }).catch(e=>{console.error(e);showAlert('Error loading student')})
    }

    document.getElementById('studentForm').addEventListener('submit', function(e){
      e.preventDefault();
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        parent_contact: document.getElementById('parentContact').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value,
        username: document.getElementById('username').value,
        admission_date: document.getElementById('admissionDate').value || undefined,
        password: document.getElementById('password').value || undefined
      };

      fetch('/update_student/' + studentId, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      }).then(r=>r.json()).then(data=>{
        if(data.status==='success'){
          showAlert('Student updated successfully');
          // go back to admin page (or reload)
          location.href = '/admin';
        } else {
          showAlert('Update failed: ' + (data.message||''))
        }
      }).catch(e=>{console.error(e);showAlert('Update failed')})
    });

    document.getElementById('deleteBtn').addEventListener('click', function(){
      if(!confirm('Delete this student? This action cannot be undone.')) return;
      fetch('/delete_student/' + studentId, {
        method: 'DELETE',
        credentials: 'same-origin',
        headers: {'Content-Type':'application/json'},
      }).then(r=>r.json()).then(data=>{
        if(data.status==='success'){
          showAlert('Student deleted');
          location.href = '/admin';
        } else {
          showAlert('Delete failed: ' + (data.message||''))
        }
      }).catch(e=>{console.error(e);showAlert('Delete failed')})
    });

    if(studentId) loadStudent();
  </script>
</body>
</html>
