<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="170" viewBox="0 0 500 170" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue background -->
  <rect width="500" height="150" fill="#003d82"/>
  
  <!-- Shield -->
  <g transform="translate(30, 25)">
    <!-- Shield outline -->
    <path d="M 20 5 L 50 5 L 50 35 Q 35 55 35 55 Q 20 35 20 35 Z" 
          fill="#d4af37" stroke="#d4af37" stroke-width="0.5"/>
    
    <!-- Shield inner frame -->
    <path d="M 23 8 L 47 8 L 47 32 Q 35 51 35 51 Q 23 32 23 32 Z" 
          fill="#003d82" opacity="0.3"/>
    
    <!-- Sun at top -->
    <circle cx="35" cy="18" r="5" fill="#d4af37"/>
    <line x1="35" y1="10" x2="35" y2="6" stroke="#d4af37" stroke-width="1.5"/>
    <line x1="35" y1="30" x2="35" y2="34" stroke="#d4af37" stroke-width="1.5"/>
    <line x1="46" y1="18" x2="50" y2="18" stroke="#d4af37" stroke-width="1.5"/>
    <line x1="24" y1="18" x2="20" y2="18" stroke="#d4af37" stroke-width="1.5"/>
    
    <!-- Book in middle -->
    <rect x="26" y="32" width="18" height="10" fill="none" stroke="#d4af37" stroke-width="1.2"/>
    <line x1="35" y1="32" x2="35" y2="42" stroke="#d4af37" stroke-width="1"/>
  </g>
  
  <!-- SAPTHAGIRI text -->
  <text x="100" y="60" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" 
        fill="white" letter-spacing="1">SAPTHAGIRI</text>
  
  <!-- NPS text after SAPTHAGIRI -->
  <text x="390" y="60" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" 
        fill="white" letter-spacing="1">NPS</text>
  
  <!-- Divider line -->
  <line x1="100" y1="80" x2="450" y2="80" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  
  <!-- UNIVERSITY text -->
  <text x="100" y="140" font-family="Arial, Helvetica, sans-serif" font-size="24" 
        fill="white" font-weight="300" letter-spacing="1">UNIVERSITY</text>
</svg>